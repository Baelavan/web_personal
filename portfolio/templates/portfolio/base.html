<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Diego Narambuena - Portfolio Multitalento{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 0;
        }
        .skill-card {
            transition: transform 0.3s ease;
        }
        .skill-card:hover {
            transform: translateY(-5px);
        }
        .navbar-brand {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Navbar mejorada -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fas fa-star me-2"></i>Soluciones
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <ul class="navbar-nav ms-auto">
						<li class="nav-item"><a class="nav-link" href="{% url 'home' %}#about">Inicio</a></li>
						<li class="nav-item"><a class="nav-link" href="{% url 'about' %}">Sobre Mí</a></li>
						<li class="nav-item"><a class="nav-link" href="{% url 'portfolio_category' 'code' %}">Programación</a></li>
						<li class="nav-item"><a class="nav-link" href="{% url 'portfolio_category' 'video' %}">Video</a></li>
						<li class="nav-item"><a class="nav-link" href="{% url 'portfolio_category' 'music' %}">Música</a></li>
						<li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contacto</a></li>
					</ul>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="bg-dark text-white mt-5 py-4">
        <div class="container text-center">
            <p>&copy; 2025.Diego Armando Narambuena Todos los derechos reservados.</p>
            <div class="social-links">
                <a href="https://linkedin.com/in//diego-narambuena-828522213" class="text-white me-3" target="_blank" title="LinkedIn"><i class="fab fa-linkedin fa-lg"></i></a>
           		<a href="https://github.com/Baelavan" class="text-white me-3" target="_blank" title="GitHub"><i class="fab fa-github fa-lg"></i></a>
                <a href="https://youtube.com/@ReitharTV" class="text-white me-3" target="_blank" title="YouTube"><i class="fab fa-youtube fa-lg"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
